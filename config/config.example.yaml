# JustEvents configuration
# Copy this file to config/config.yaml and fill in your settings.
#
# SECRETS go in the .env file (or as environment variables), NOT here.
# .env is git-ignored; this file can safely be committed.

# -------------------------------------------------------------------------
# Discord
# -------------------------------------------------------------------------
discord:
  # Your Discord server ID.
  # Right-click your server name in Discord → "Copy Server ID"
  # (Enable Developer Mode in Discord settings if this option is missing.)
  guild_id: "YOUR_GUILD_ID_HERE"

  # Bot token is read from the DISCORD_BOT_TOKEN environment variable.
  # Do not put it here.

  # Settings for command-based event creation modes (sesh/justevent).
  command:
    # Default channel where command messages are posted.
    # Can be overridden per source with command_channel_id.
    default_channel_id: ""

  # Optional settings for long-running JustEvent listener mode.
  justevent_listener:
    # Channel ID the listener watches for /create command payloads.
    listen_channel_id: ""

# -------------------------------------------------------------------------
# Event sources
# -------------------------------------------------------------------------
# Add one entry per Meetup group (or other source) you want to mirror.
# Supported source types: meetup
#
# Fields common to all sources:
#   type          (required) Source type identifier.
#   name          (required) Human-readable label shown in Discord event footers.
#   event_creation_method   direct (default), sesh, or justevent.
#   command_channel_id      Required for sesh/justevent unless global default is set.
#   command_target_channel  Channel mention included in generated command payloads.
#   default_location        Fallback location when source data has no location.
#   command_ack_timeout_seconds
#                           In justevent mode: wait this long for listener confirmation.
#   lookahead_days           Override the global lookahead for this source.
#   local_sample             Path to a local file for offline testing.
#                            Provide an .ics file for accurate event times.

sources:
  - type: meetup
    name: "Gothenburg Board Gamers (GoBo)"
    group_slug: "gothenburg-board-gamers-gobo"
    event_creation_method: "direct" # direct, sesh, or justevent
    # command_channel_id: "123456789012345678"
    # command_target_channel: "#events"
    # default_location: "Gothenburg Boardgamers, Gyllenkrooksgatan, Gothenburg, Sweden"
    # command_ack_timeout_seconds: 30
    # prefer_ical: true   # Use iCal (default). Set false to force RSS (times unavailable).

  # Template for adding another Meetup group:
  # - type: meetup
  #   name: "My Other Group"
  #   group_slug: "my-other-group-slug"

# -------------------------------------------------------------------------
# Sync settings
# -------------------------------------------------------------------------
sync:
  # Sync events starting within this many days from now.
  lookahead_days: 90
  # Default method for all sources that do not specify event_creation_method.
  default_event_creation_method: "direct"
